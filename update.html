<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark'it Live Sync Update</title>
</head>
<body>
  <script>
    // GitHub Pages Live Sync Update Endpoint
    // This file receives POST requests with data and triggers GitHub Actions
    
    if (window.location.search.includes('v=')) {
      // This is a sync request - trigger page reload with cache busting
      const version = window.location.search.split('v=')[1];
      console.log('Live-Sync Update: Version', version);
      
      // Store the received data
      fetch('spark-data.json?' + Date.now())
        .then(response => response.json())
        .then(data => {
          console.log('Live-Sync Update: Data loaded', data);
          // Trigger GitHub Actions through page access
          setTimeout(() => {
            window.location.href = '/?sync=' + Date.now();
          }, 100);
        })
        .catch(() => {
          console.log('Live-Sync Update: No data file found');
          window.location.href = '/?sync=' + Date.now();
        });
    } else {
      // Redirect to main page
      window.location.href = '/';
    }
  </script>
</body>
</html>
