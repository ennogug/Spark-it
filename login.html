<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spark'it - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cabin+Sketch:wght@400;700&family=Caveat:wght@500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8f0f20;
      --secondary: #8f0f20;
      --accent: #8f0f20;
      --background: #fdfdfb;
      --surface: #fffefb;
      --dark: #1f1f1f;
      --muted: #d9d9d3;
      --line: rgba(31, 31, 31, 0.16);
      --shadow: 0 16px 42px rgba(31, 31, 31, 0.08);
      --radius: 26px;
    }

    * {
      box-sizing: border-box;
      font-family: "Times New Roman", Times, serif;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--background);
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%238f0f20' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
      background-size: 200px;
      background-position: center;
      background-repeat: repeat;
      color: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        linear-gradient(rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.74));
      opacity: 1;
    }

    body::after {
      background:
        radial-gradient(circle at 16% 22%, rgba(122, 30, 51, 0.06), transparent 28%),
        radial-gradient(circle at 86% 78%, rgba(122, 30, 51, 0.05), transparent 30%);
      background-size: auto;
      mix-blend-mode: normal;
      opacity: 0.36;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: min(100%, 420px);
      padding: clamp(32px, 6vw, 48px);
      background:
        radial-gradient(circle at 20% 8%, rgba(122, 30, 51, 0.10), transparent 28%),
        radial-gradient(circle at 86% 82%, rgba(122, 30, 51, 0.08), transparent 34%),
        var(--surface);
      border: 1.8px solid rgba(15, 31, 61, 0.16);
      border-radius: 30px 20px 34px 18px;
      box-shadow: var(--shadow);
      transform: rotate(-1deg);
      animation: fadeIn 0.8s ease;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 0.9;
      letter-spacing: -0.01em;
      color: var(--primary);
      text-shadow: 2px 3px 0 rgba(255, 255, 255, 0.8);
      transform: rotate(-1deg);
    }

    .login-header p {
      margin: 12px 0 0;
      color: rgba(31, 31, 31, 0.7);
      font-size: clamp(0.9rem, 1.2vw, 1.1rem);
      font-style: italic;
    }

    .login-form {
      display: grid;
      gap: 20px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      font-weight: 500;
    }

    .password-input {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid rgba(15, 31, 61, 0.16);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.82);
      font-size: 1.1rem;
      font-family: "Times New Roman", Times, serif;
      color: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    .password-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(122, 30, 51, 0.16);
      background: rgba(255, 255, 255, 0.95);
    }

    .login-button {
      padding: 18px 24px;
      border: none;
      border-radius: 22px 28px 24px 18px;
      background: linear-gradient(145deg, #a41b2e, #8f0f20);
      color: #fffaf7;
      font-size: 1.1rem;
      font-family: "Times New Roman", Times, serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(122, 30, 51, 0.25);
      font-weight: 500;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(122, 30, 51, 0.35);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #dc2626;
      font-size: 0.9rem;
      text-align: center;
      animation: shake 0.5s ease;
    }

    .success-message {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #16a34a;
      font-size: 0.9rem;
      text-align: center;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fffaf7;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px) rotate(-1deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotate(-1deg);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-container {
        margin: 20px;
        padding: 24px;
        transform: none;
      }
      
      .login-header h1 {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>Spark'it</h1>
      <p>Geschützter Bereich für Vincent Braun</p>
    </div>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="password">Passwort</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          class="password-input" 
          placeholder="Passwort eingeben"
          required
          autocomplete="current-password"
          autofocus
        >
      </div>

      <button type="submit" class="login-button" id="loginButton">
        Anmelden
      </button>

      <div id="messageContainer"></div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginButton = document.getElementById('loginButton');
    const passwordInput = document.getElementById('password');
    const messageContainer = document.getElementById('messageContainer');

    function showMessage(message, type = 'error') {
      messageContainer.innerHTML = `
        <div class="${type}-message">
          ${message}
        </div>
      `;
      
      if (type === 'success') {
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      }
    }

    function setLoading(loading) {
      if (loading) {
        loginButton.disabled = true;
        loginButton.innerHTML = '<span class="loading"></span>Anmelden...';
      } else {
        loginButton.disabled = false;
        loginButton.innerHTML = 'Anmelden';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const password = passwordInput.value.trim();
      if (!password) {
        showMessage('Bitte gib ein Passwort ein.');
        return;
      }

      setLoading(true);
      messageContainer.innerHTML = '';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: `password=${encodeURIComponent(password)}`
        });

        const data = await response.json();

        if (response.ok && data.success) {
          showMessage('Anmeldung erfolgreich! Weiterleitung...', 'success');
        } else {
          showMessage(data.error || 'Anmeldung fehlgeschlagen.');
        }
      } catch (error) {
        console.error('Login error:', error);
        showMessage('Verbindungsfehler. Bitte versuche es erneut.');
      } finally {
        setLoading(false);
      }
    }

    loginForm.addEventListener('submit', handleLogin);

    // Focus password input on load
    passwordInput.focus();

    // Clear message on input
    passwordInput.addEventListener('input', () => {
      if (messageContainer.innerHTML) {
        messageContainer.innerHTML = '';
      }
    });
  </script>
</body>
</html>
