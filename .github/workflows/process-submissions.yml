name: Process User Submissions

on:
  # Repository Dispatch Event (für automatische Submissions)
  repository_dispatch:
    types: [user-submission]
  
  # Manuelles Auslösen
  workflow_dispatch:
    inputs:
      submission_data:
        description: 'JSON-String mit Submission-Daten (optional)'
        required: false
        default: ''
  
  # Regelmäßige Prüfung auf neue Submissions
  schedule:
    - cron: '0 */6 * * *'  # Alle 6 Stunden

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm install cheerio
      
      - name: Process submission data
        id: process
        run: |
          node scripts/process-submissions.js
        env:
          SUBMISSION_DATA: ${{ github.event.client_payload }}
          MANUAL_DATA: ${{ github.event.inputs.submission_data }}
      
      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config user.name "Spark'it Bot"
          git config user.email "bot@sparkit.local"
          git add .
          git commit -m "Auto-update: Process user submissions $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: Create summary
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          echo "✅ Änderungen erfolgreich verarbeitet und committed" >> $GITHUB_STEP_SUMMARY
          echo "- Zeitstempel: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: $(git rev-parse --short HEAD)" >> $GITHUB_STEP_SUMMARY
      
      - name: No changes summary
        if: steps.verify-changed-files.outputs.changed == 'false'
        run: |
          echo "ℹ️ Keine neuen Änderungen zum Verarbeiten" >> $GITHUB_STEP_SUMMARY
