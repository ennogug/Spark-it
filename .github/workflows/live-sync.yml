name: Live Data Synchronization

on:
  push:
    paths:
      - 'spark-data.json'
  workflow_dispatch:
  schedule:
    # Run every 1 minute for real-time sync
    - cron: '*/1 * * * *'

jobs:
  live-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Check for data file
      id: check_data
      run: |
        if [ -f "spark-data.json" ]; then
          echo "has_data=true" >> $GITHUB_OUTPUT
          echo "data_size=$(stat -c%s spark-data.json)" >> $GITHUB_OUTPUT
          echo "last_modified=$(git log -1 --format=%ct -- spark-data.json 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
        else
          echo "has_data=false" >> $GITHUB_OUTPUT
        fi

    - name: Create data file if missing
      if: steps.check_data.outputs.has_data == 'false'
      run: |
        echo '{"version":1,"timestamp":'$(date +%s)',"sharedIdeas":[],"sharedImages":[],"customIdeas":[],"editedIdeas":{},"deletedIdeas":[],"history":{"date":[],"short":[],"fullday":[]}}' > spark-data.json

    - name: Update HTML with latest data
      run: |
        # Create backup of current HTML
        cp index.html index.html.backup
        
        # Update HTML with new data using Node.js
        node -e "
          const fs = require('fs');
          try {
            // Read data
            const data = JSON.parse(fs.readFileSync('spark-data.json', 'utf8'));
            
            // Read HTML
            let html = fs.readFileSync('index.html', 'utf8');
            
            // Update data injection
            const dataPattern = /window\.sparkInitialData = .*?;/;
            const newData = 'window.sparkInitialData = ' + JSON.stringify(data) + ';';
            html = html.replace(dataPattern, newData);
            
            // Update version in console log
            const versionPattern = /console\.log\('Live-Sync: Initial data loaded from HTML, version', \\\\d+\);/;
            const newVersion = 'console.log(\\'Live-Sync: Initial data loaded from HTML, version', ' + (data.version || 1) + ');';
            html = html.replace(versionPattern, newVersion);
            
            // Write updated HTML
            fs.writeFileSync('index.html', html);
            console.log('HTML updated with version ' + (data.version || 1));
          } catch (e) {
            console.error('Error updating HTML:', e);
            process.exit(1);
          }
        "

    - name: Update timestamp and version
      run: |
        node -e "
          const fs = require('fs');
          try {
            const data = JSON.parse(fs.readFileSync('spark-data.json', 'utf8'));
            data.version = (data.version || 0) + 1;
            data.timestamp = Date.now();
            fs.writeFileSync('spark-data.json', JSON.stringify(data, null, 2));
            console.log('Data version updated to', data.version);
          } catch (e) {
            console.error('Error updating data:', e);
            process.exit(1);
          }
        "

    - name: Verify changes
      run: |
        echo "Checking if files were modified..."
        if git diff --quiet index.html spark-data.json; then
          echo "No changes detected, skipping commit"
        else
          echo "Changes detected, proceeding with commit"
          git status
        fi

    - name: Commit and push changes
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html spark-data.json
        
        # Only commit if there are changes
        if ! git diff --staged --quiet; then
          CURRENT_VERSION=$(node -e "
            try {
              const data = JSON.parse(require('fs').readFileSync('spark-data.json', 'utf8'));
              console.log(data.version || 1);
            } catch (e) {
              console.log(1);
            }
          ")
          git commit -m "Live sync update - v$CURRENT_VERSION [skip ci]"
          git push
          echo "Changes pushed successfully"
        else
          echo "No changes to commit"
        fi
