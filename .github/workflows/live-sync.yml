name: Live Data Synchronization

on:
  push:
    paths:
      - 'spark-data.json'
  workflow_dispatch:
  schedule:
    # Run every 2 minutes for near real-time sync
    - cron: '*/2 * * * *'

jobs:
  live-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check for data file
      id: check_data
      run: |
        if [ -f "spark-data.json" ]; then
          echo "has_data=true" >> $GITHUB_OUTPUT
          echo "data_size=$(stat -c%s spark-data.json)" >> $GITHUB_OUTPUT
          echo "last_modified=$(git log -1 --format=%ct -- spark-data.json 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT
        else
          echo "has_data=false" >> $GITHUB_OUTPUT
        fi

    - name: Create data file if missing
      if: steps.check_data.outputs.has_data == 'false'
      run: |
        echo '{"version":1,"timestamp":'$(date +%s)',"sharedIdeas":[],"sharedImages":[],"customIdeas":[],"editedIdeas":{},"deletedIdeas":[],"history":{"date":[],"short":[],"fullday":[]}}' > spark-data.json

    - name: Update HTML with latest data
      run: |
        # Read current data
        DATA_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('spark-data.json', 'utf8')).version)")
        DATA_JSON=$(node -e "console.log(JSON.stringify(JSON.parse(require('fs').readFileSync('spark-data.json', 'utf8'))))")
        
        # Update HTML with new data
        sed -i "s|window.sparkInitialData = .*;|window.sparkInitialData = $DATA_JSON;|g" index.html
        sed -i "s|console.log('Live-Sync: Initial data loaded from HTML, version', .*);|console.log('Live-Sync: Initial data loaded from HTML, version', $DATA_VERSION);|g" index.html
        
        echo "HTML updated with version $DATA_VERSION"

    - name: Update timestamp and version
      run: |
        node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('spark-data.json', 'utf8'));
          data.version = (data.version || 0) + 1;
          data.timestamp = Date.now();
          fs.writeFileSync('spark-data.json', JSON.stringify(data, null, 2));
          console.log('Data version updated to', data.version);
        "

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html spark-data.json
        git diff --staged --quiet || git commit -m "Live sync update - v$(node -e "console.log(JSON.parse(require('fs').readFileSync('spark-data.json', 'utf8')).version)") [skip ci]"
        git push
